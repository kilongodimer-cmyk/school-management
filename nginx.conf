# Configuration Nginx pour production

upstream django_app {
    server localhost:8000;
}

# Redirection HTTP -> HTTPS
server {
    listen 80;
    server_name schoolmanagement.com www.schoolmanagement.com;
    return 301 https://$server_name$request_uri;
}

# Configuration HTTPS
server {
    listen 443 ssl http2;
    server_name schoolmanagement.com www.schoolmanagement.com;

    # Certificats SSL (remplacer par vos certificats)
    ssl_certificate /etc/letsencrypt/live/schoolmanagement.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/schoolmanagement.com/privkey.pem;

    # Configuration SSL optimisée
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Taille max du body
    client_max_body_size 20M;

    # Fichiers statiques
    location /static/ {
        alias /var/www/school_management/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers média
    location /media/ {
        alias /var/www/school_management/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Fichiers de santé check (monitoring)
    location /health/ {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Proxy vers Django
    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;

        # Gestion des WebSockets (si applicable)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Deny access to sensitive files
    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.git {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Configuration pour redirection www vers non-www
map $host $remove_www {
    default $scheme://$host$request_uri;
    "~^www\.(?<domain>.+)$" $scheme://$domain$request_uri;
}
