{% extends 'accounts/base.html' %}

{% block content %}
<div class="container mt-4">
  <h3>Élèves débiteurs</h3>
  <div class="card">
    <div class="card-body p-0">
      <table class="table mb-0">
        <thead class="table-light"><tr><th>Élève</th><th>ID</th><th>Classe</th></tr></thead>
        <tbody>
          {% for s in debtors %}
          <tr>
            <td><a href="{% url 'finance:student_payments' s.id %}">{{ s.get_full_name }}</a></td>
            <td>{{ s.student_id }}</td>
            <td>{{ s.current_class }}</td>
          </tr>
          {% empty %}
          <tr><td colspan="3" class="text-center">Aucun élève débiteur.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
