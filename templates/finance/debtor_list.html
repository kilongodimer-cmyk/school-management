{% extends 'accounts/base.html' %}

{% block content %}
<div class="sm-page sm-reveal">
  <div class="sm-page-header">
    <div>
      <h1>Eleves debiteurs</h1>
      <p class="sm-text-muted">Liste des comptes en retard.</p>
    </div>
    <a class="sm-btn-outline" href="{% url 'finance:dashboard' %}">Retour</a>
  </div>

  <div class="sm-panel">
    <div class="table-responsive">
      <table class="table sm-table">
        <thead><tr><th>Eleve</th><th>ID</th><th>Classe</th></tr></thead>
        <tbody>
          {% for s in debtors %}
          <tr>
            <td><a href="{% url 'finance:student_payments' s.id %}">{{ s.get_full_name }}</a></td>
            <td>{{ s.student_id }}</td>
            <td>{{ s.current_class }}</td>
          </tr>
          {% empty %}
          <tr><td colspan="3" class="text-center">Aucun eleve debiteur.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
