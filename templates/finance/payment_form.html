{% extends 'accounts/base.html' %}
{% load static %}

{% block content %}
<div class="sm-page sm-reveal">
  <div class="sm-page-header">
    <div>
      <h1>Enregistrer un paiement</h1>
      <p class="sm-text-muted">Saisie d un encaissement eleve.</p>
    </div>
    <a class="sm-btn-outline" href="{% url 'finance:payments_list' %}">Retour</a>
  </div>

  <div class="sm-panel">
    <form method="post">
      {% csrf_token %}
      <div class="sm-info-grid">
        <div class="sm-field">
          <label class="sm-label">Eleve</label>
          {{ form.student|as_crispy_field }}
        </div>
        <div class="sm-field">
          <label class="sm-label">Montant</label>
          {{ form.amount }}
        </div>
        <div class="sm-field">
          <label class="sm-label">Type</label>
          {{ form.payment_type }}
        </div>
        <div class="sm-field">
          <label class="sm-label">Date</label>
          {{ form.payment_date }}
        </div>
        <div class="sm-field" style="grid-column: 1 / -1;">
          <label class="sm-label">Notes</label>
          {{ form.notes }}
        </div>
      </div>
      <div class="sm-actions" style="margin-top: 20px;">
        <a class="sm-btn-outline" href="{% url 'finance:payments_list' %}">Annuler</a>
        <button class="sm-btn-primary" type="submit">Enregistrer</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
