version: '3.8'

services:
  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: school_management_db
    environment:
      POSTGRES_DB: school_management_db
      POSTGRES_USER: school_mgmt_user
      POSTGRES_PASSWORD: secure_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school_mgmt_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: school_management_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Django
  web:
    build: .
    container_name: school_management_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn school_management.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    environment:
      - DEBUG=False
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=school_management_db
      - DB_USER=school_mgmt_user
      - DB_PASSWORD=secure_password_change_me
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0

  # Celery Worker (pour les tâches asynchrones)
  celery:
    build: .
    container_name: school_management_celery
    command: celery -A school_management worker -l info
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
    environment:
      - DEBUG=False
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=school_management_db
      - DB_USER=school_mgmt_user
      - DB_PASSWORD=secure_password_change_me
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0

  # Celery Beat (pour les tâches planifiées)
  celery-beat:
    build: .
    container_name: school_management_celery_beat
    command: celery -A school_management beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
    environment:
      - DEBUG=False
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=school_management_db
      - DB_USER=school_mgmt_user
      - DB_PASSWORD=secure_password_change_me
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: school_management_network
